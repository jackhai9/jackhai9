name: Update readme

on:
  schedule:
    # Run at 18:37 Asia/Shanghai so GitHub schedule delays are less likely to cross midnight.
    - cron: "37 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check profile stats token
        env:
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
        run: |
          if [ -z "$PROFILE_STATS_TOKEN" ]; then
            echo "PROFILE_STATS_TOKEN is required for private repository statistics."
            exit 1
          fi

      - name: Prepare profile output directory
        run: mkdir -p profile

      - name: Generate 3D contribution profile
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: ./3d-profile-settings.json

      - name: Move generated profile
        run: |
          mv ./profile-3d-contrib/profile-3d.svg ./profile-3d.svg
          rm -rf ./profile-3d-contrib

      - name: Generate GitHub stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&include_all_commits=true&show_icons=true&custom_title=jackhai9%27s%20GitHub%20stats
          path: profile/private-stats.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=default&show_icons=true
          path: profile/private-top-langs.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN }}

      - name: Update README image cache keys
        env:
          CACHE_BUST: ${{ github.run_id }}
        run: |
          perl -0pi -e 's#(\./profile-3d\.svg)(\?v=[^"]*)?#$1?v=$ENV{CACHE_BUST}#g; s#(\./profile/private-stats\.svg)(\?v=[^"]*)?#$1?v=$ENV{CACHE_BUST}#g; s#(\./profile/private-top-langs\.svg)(\?v=[^"]*)?#$1?v=$ENV{CACHE_BUST}#g' README.md

      - name: Commit changes through pull request
        env:
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          UPDATE_BRANCH: profile-readme-update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$UPDATE_BRANCH"
          git add -A README.md 3d-profile-settings.json profile-3d.svg profile
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update profile readme"
          git push --force-with-lease origin "$UPDATE_BRANCH"

          if ! gh pr create \
            --base main \
            --head "$UPDATE_BRANCH" \
            --title "Update profile readme" \
            --body "Automated profile asset update from GitHub Actions run $GITHUB_RUN_ID."; then
            gh pr view "$UPDATE_BRANCH" --json url --jq .url
          fi

          gh pr merge "$UPDATE_BRANCH" --squash --delete-branch
